<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-image: url('images/arkansas.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .fullscreen-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 1;
        }

        .content-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            overflow: auto;
            padding: 10px;
        }

        /* THE RESPONSIVE WOODEN BOX */
        .centered-box {
            width: 90vw;
            height: 85vh; /* Explicit height keeps it from collapsing */
            max-width: 1665px;
            background-image: url('images/detailedwood_sides_trimmed.png');
            background-size: 100% 100%; /* Stretches the image to preserve gold edges */
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: auto;
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); /* Depth against the mountain */
        }

        .indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: Arial, sans-serif;
            z-index: 2;
            cursor: pointer;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }
    
        /* Left chats toggle button */
        #chats-toggle-btn {
          position: fixed;
          top: 50%;
          left: 0;
          transform: translateY(-50%);
          z-index: 120;
          writing-mode: vertical-rl;
          text-orientation: mixed;
          background: rgba(30, 15, 5, 0.85);
          color: #f5f5dc;
          border: 1px solid rgba(255, 255, 255, 0.25);
          border-radius: 0 6px 6px 0;
          padding: 10px 6px;
          cursor: pointer;
          font-family: "Segoe UI", sans-serif;
          font-size: 12px;
          backdrop-filter: blur(4px);
        }

        /* Chats sidebar drawer */
        #chats-sidebar {
          position: fixed;
          top: 0;
          left: 0;
          width: 260px;
          height: 100vh;
          background: rgba(20, 10, 5, 0.95);
          border-right: 1px solid rgba(255, 255, 255, 0.15);
          box-shadow: 4px 0 12px rgba(0, 0, 0, 0.5);
          transform: translateX(-100%);
          transition: transform 0.3s ease;
          z-index: 130;
          display: flex;
          flex-direction: column;
          font-family: "Segoe UI", sans-serif;
          color: #f5f5dc;
        }

        #chats-sidebar.open {
          transform: translateX(0);
        }

        #chats-sidebar-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 12px 14px;
          border-bottom: 1px solid rgba(255, 255, 255, 0.15);
          font-weight: 600;
          font-size: 13px;
        }

        #chats-close-btn {
          background: transparent;
          border: none;
          color: #f5f5dc;
          font-size: 16px;
          cursor: pointer;
        }

        #chats-list {
          flex: 1;
          overflow-y: auto;
          padding: 8px 10px;
        }

        .chat-session-item {
          padding: 8px 10px;
          margin-bottom: 6px;
          border-radius: 6px;
          background: rgba(255, 255, 255, 0.04);
          cursor: pointer;
          font-size: 12px;
          line-height: 1.3;
        }

        .chat-session-item:hover {
          background: rgba(255, 255, 255, 0.12);
        }

        #chats-new-btn {
          margin: 10px;
          padding: 8px 10px;
          border-radius: 6px;
          border: 1px solid rgba(255, 255, 255, 0.25);
          background: rgba(184, 134, 11, 0.9);
          color: #f5f5dc;
          font-size: 12px;
          cursor: pointer;
        }

        /* --- SETTINGS PANEL (MOVED TO CORNER) --- */
        #settings-panel {
            position: fixed; /* Position relative to viewport */
            top: 20px;
            left: 20px;
            z-index: 100; /* Ensure it's on top */
            background: rgba(101, 67, 33, 0.85); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 8px 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        #settings-header { 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            font-weight: 600; 
            color: #f5f5dc; 
            font-size: 13px; 
            padding-bottom: 6px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .settings-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .setting-btn { 
            background: rgba(0,0,0,0.2); 
            color: #f5f5dc; 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 6px; 
            padding: 5px 10px; 
            cursor: pointer; 
            font-size: 12px; 
            transition: background 0.2s ease;
        }
        .setting-btn:hover { background: rgba(0,0,0,0.4); }

        /* --- CHAT OVERLAY & DYNAMIC INPUT --- */
        #wood-chat-overlay {
            position: absolute;
            top: 18%; bottom: 18%; left: 33%; right: 33%;  
            display: flex; flex-direction: column; 
            z-index: 20; pointer-events: none; 
        }
        #wood-chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; pointer-events: auto; scrollbar-width: none; transition: opacity 0.5s ease; }
        #wood-chat-messages::-webkit-scrollbar { display: none; }

        #wood-input-area {
            pointer-events: auto;
            display: flex;
            gap: 10px;
            background: rgba(30, 15, 5, 0.7);
            padding: 8px 12px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); /* Smooth animation */
        }

        /* State 1: Input is centered initially */
        #wood-chat-overlay.input-centered {
            justify-content: center; /* Vertically center the input box */
        }
        .input-centered #wood-chat-messages {
            display: none; /* Hide empty message area */
        }
        .input-centered #wood-input-area {
            margin-top: 0; /* Remove margin when centered */
        }

        /* State 2: Input is at the bottom after first message */
        #wood-chat-overlay:not(.input-centered) {
            justify-content: flex-end; /* Push input to bottom */
        }

        /* --- CHAT BUBBLES --- */
        .chat-bubble { 
            padding: 12px 16px; 
            border-radius: 8px; 
            max-width: 90%; 
            word-wrap: break-word; 
            font-family: 'Segoe UI', sans-serif; 
            font-size: 13.5px; 
            line-height: 1.5; 
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Default Colors: Gold (AI), Brown (User) */
        .chat-bubble.ai   { background: rgba(184, 134, 11, 0.7); color: #f5f5dc; align-self: flex-start; text-align: left; border-left: 3px solid #8b6508; }
        .chat-bubble.user { background: rgba(139, 69, 19, 0.65); color: #f5f5dc; align-self: flex-end; text-align: right; border-left: 3px solid #8b4513; }

        /* Theme Overrides */
        .walnut-theme .chat-bubble.ai { background: rgba(60, 40, 30, 0.75); border-left-color: #3e2723; }
        .solid-bubbles .chat-bubble.ai   { background: rgb(184, 134, 11); }
        .solid-bubbles .chat-bubble.user { background: rgb(139, 69, 19); }
        .solid-bubbles.walnut-theme .chat-bubble.ai { background: rgb(60, 40, 30); }

        /* INPUT AREA */
        #wood-input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            font-size: 13.5px; 
            outline: none; 
            transition: font-size 0.2s ease; 
        }
        #wood-input::placeholder { color: rgba(255,255,255,0.5); }
        #wood-send-btn { 
            background: rgba(184, 134, 11, 0.85); 
            border: none; 
            color: white; 
            border-radius: 50%; 
            width: 32px; 
            height: 32px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: background 0.2s ease;
            flex-shrink: 0;
        }
        #wood-send-btn:hover { background: rgba(184, 134, 11, 1); }

        /* --- MOBILE RESPONSIVE STYLES --- */
        @media (max-width: 768px) {
            
            .centered-box {
                width: 95vw;
                height: 90vh;
            }

            #wood-chat-overlay {
                left: 5%;
                right: 5%;
                top: 10%;
                bottom: 12%;
            }

            /* Shrink the settings panel slightly so it doesn't block the screen */
            #settings-panel {
                top: 10px;
                left: 10px;
                transform: scale(0.85);
                transform-origin: top left;
                padding: 6px 10px;
            }

            #settings-header {
                font-size: 11px;
                padding-bottom: 4px;
            }

            .setting-btn {
                padding: 4px 8px;
                font-size: 11px;
            }

            /* Make sure the input area doesn't break */
            #wood-input-area {
                padding: 6px 10px;
            }

            #wood-input {
                font-size: 12px;
            }

            /* Ensure the sidebar doesn't take up the WHOLE screen when opened */
            #chats-sidebar {
                width: 80%;
                max-width: 300px;
            }

            /* Make chat bubbles more readable on small screens */
            .chat-bubble {
                padding: 10px 12px;
                font-size: 12px;
                max-width: 95%;
            }

            /* Adjust indicator size for mobile */
            .indicator {
                font-size: 10px;
                padding: 8px 12px;
                bottom: 10px;
                right: 10px;
            }
        }

        /* Extra small screens (phones in portrait) */
        @media (max-width: 480px) {
            
            .centered-box {
                width: 98vw;
                height: 96vh;
            }

            #wood-chat-overlay {
                left: 4%;
                right: 4%;
                top: 8%;
                bottom: 10%;
            }

            #settings-panel {
                transform: scale(0.75);
                top: 5px;
                left: 5px;
                padding: 5px 8px;
            }

            #settings-header {
                font-size: 10px;
            }

            .setting-btn {
                padding: 3px 6px;
                font-size: 10px;
            }

            .chat-bubble {
                padding: 8px 10px;
                font-size: 11px;
            }

            #wood-input {
                font-size: 11px;
            }

            #wood-send-btn {
                width: 28px;
                height: 28px;
            }

            #wood-send-btn svg {
                width: 14px;
                height: 14px;
            }

            #chats-toggle-btn {
                padding: 8px 4px;
                font-size: 10px;
            }

            .indicator {
                font-size: 9px;
                padding: 6px 10px;
                bottom: 5px;
                right: 5px;
            }
        }

    </style>

</head>
<body>

<!-- Chats toggle button (left edge) -->
<button id="chats-toggle-btn">Chats</button>

<!-- Chats sidebar drawer -->
<div id="chats-sidebar">
  <div id="chats-sidebar-header">
    <span>Chats</span>
    <button id="chats-close-btn">✕</button>
  </div>
  <div id="chats-list"></div>
  <button id="chats-new-btn">+ New Chat</button>
</div>

    <div class="fullscreen-trigger" id="fsElement"></div>

    <div class="content-container">
        <div class="centered-box">
            <!-- Wood background is now applied as CSS background-image -->

    <!-- SETTINGS PANEL (MOVED) -->
    <div id="settings-panel">
        <div id="settings-header">Settings</div>
        <div class="settings-controls">
            <button id="font-btn" class="setting-btn" onclick="cycleFontSize()">Aa: <span id="font-size-display">13.5</span></button>
            <button id="color-btn" class="setting-btn" onclick="toggleAiColor()">🎨 Color</button>
            <button id="opacity-btn" class="setting-btn" onclick="toggleOpacity()">💧 Opacity</button>
        </div>
    </div>

    <!-- CHAT OVERLAY -->
    <div id="wood-chat-overlay">
        <div id="wood-chat-messages"></div>
        <div id="wood-input-area">
            <input type="text" id="wood-input" placeholder="Type here..." onkeypress="handleKey(event)">
            <button id="wood-send-btn" onclick="sendMsg()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9"></polygon></svg>
            </button>
        </div>
    </div>

        </div>
    </div>

    <div class="indicator" id="fsIndicator">Click to toggle fullscreen</div>

    <script>
        const fsElement = document.getElementById('fsElement');
        const indicator = document.getElementById('fsIndicator');

        window.addEventListener('load', () => {
            enterFullscreen();
        });

        fsElement.addEventListener('click', toggleFullscreen);
        indicator.addEventListener('click', toggleFullscreen);

        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen().catch(e => console.log(e));
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) enterFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }
    </script>

<script>
    const API_KEY = "csk-wxytp69eenkhp6tdtnwvme8838jjt3wxv95c92ffjptvnknk";
    const themeContainer = document.body;
    const chatOverlay = document.getElementById('wood-chat-overlay');
    let firstMessageSent = false;

    // --- INITIAL STATE --- 
    document.addEventListener('DOMContentLoaded', () => {
        // Start with input centered
        chatOverlay.classList.add('input-centered');
    });

    // --- SETTINGS LOGIC ---
    const fontSizes = [12, 13, 13.5, 14, 15, 16, 17];
    let fontIndex = 2; // Start at 13.5
    function cycleFontSize() {
        fontIndex = (fontIndex + 1) % fontSizes.length;
        const newSize = fontSizes[fontIndex];
        document.getElementById('font-size-display').textContent = newSize;
        document.querySelectorAll('.chat-bubble, #wood-input').forEach(el => el.style.fontSize = newSize + 'px');
    }
    function toggleAiColor() { themeContainer.classList.toggle('walnut-theme'); }
    function toggleOpacity() { themeContainer.classList.toggle('solid-bubbles'); }

    // --- CHAT LOGIC ---
    async function sendMsg() {
        // On first message, move input to bottom
        if (!firstMessageSent) {
            chatOverlay.classList.remove('input-centered');
            firstMessageSent = true;
        }

        const inp = document.getElementById('wood-input');
        const txt = inp.value.trim();
        if(!txt) return;
        addBubble(txt, 'user');
        inp.value = '';
        try {
            const res = await fetch('https://api.cerebras.ai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: "llama-3.3-70b",
                    messages: [{role: "system", content: "You are a fun, joyful, and free spirited AI."},{role: "user", content: txt}],
                    temperature: 0.8
                })
            });
            const data = await res.json();
            if(data.choices) addBubble(data.choices[0].message.content, 'ai');
        } catch(e) { addBubble("Oops, silence...", 'ai'); }
    }

    function addBubble(text, type) {
        const div = document.createElement('div');
        div.className = `chat-bubble ${type}`;
        div.textContent = text;
        div.style.fontSize = fontSizes[fontIndex] + 'px';
        const msgContainer = document.getElementById('wood-chat-messages');
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function handleKey(e) { if(e.key === 'Enter') sendMsg(); }
</script>

<script>

// Chat Sidebar Session Management
let chatSessions = [];
let activeSessionId = null;

function createNewSession() {
  const id = Date.now().toString();
  const name = "Chat " + (chatSessions.length + 1);
  chatSessions.push({ id, name, messages: [] });
  activeSessionId = id;
  renderChatList();
  clearChatView();
}

function renderChatList() {
  const listEl = document.getElementById("chats-list");
  if (!listEl) return;
  listEl.innerHTML = "";

  chatSessions.forEach((session) => {
    const item = document.createElement("div");
    item.className = "chat-session-item";
    item.textContent = session.name;

    if (session.id === activeSessionId) {
      item.style.border = "1px solid rgba(255,255,255,0.4)";
    }

    item.onclick = () => {
      activeSessionId = session.id;
      renderChatList();
      loadSessionIntoView(session);
    };
    listEl.appendChild(item);
  });
}

function clearChatView() {
  const msgContainer = document.getElementById("wood-chat-messages");
  if (msgContainer) msgContainer.innerHTML = "";
  const input = document.getElementById("wood-input");
  if (input) input.value = "";
}

function loadSessionIntoView(session) {
  const msgContainer = document.getElementById("wood-chat-messages");
  if (!msgContainer) return;
  msgContainer.innerHTML = "";
  session.messages.forEach((m) => {
    const div = document.createElement("div");
    div.className = "chat-bubble " + m.type;
    div.textContent = m.text;
    div.style.fontSize = "13.5px";
    msgContainer.appendChild(div);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  });
}

// Hook into addBubble to save messages
if (typeof _origAddBubble === 'undefined' && typeof addBubble === 'function') {
  var _origAddBubble = addBubble;
  addBubble = function (text, type) {
    _origAddBubble(text, type);
    if (!activeSessionId) return;
    const session = chatSessions.find((s) => s.id === activeSessionId);
    if (session) {
      session.messages.push({ text, type });
    }
  };
}

// Sidebar open/close
function openChatsSidebar() {
  const sidebar = document.getElementById("chats-sidebar");
  if (sidebar) sidebar.classList.add("open");
}

function closeChatsSidebar() {
  const sidebar = document.getElementById("chats-sidebar");
  if (sidebar) sidebar.classList.remove("open");
}

// Initialize sidebar
document.addEventListener("DOMContentLoaded", () => {
  const toggleBtn = document.getElementById("chats-toggle-btn");
  const closeBtn = document.getElementById("chats-close-btn");
  const newBtn = document.getElementById("chats-new-btn");

  if (toggleBtn) toggleBtn.addEventListener("click", openChatsSidebar);
  if (closeBtn) closeBtn.addEventListener("click", closeChatsSidebar);
  if (newBtn) newBtn.addEventListener("click", () => {
    createNewSession();
  });

  // Start with an initial session if none
  if (chatSessions.length === 0) {
    createNewSession();
  }
});
</script>
</body>
</html>
